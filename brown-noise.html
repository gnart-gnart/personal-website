<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Brown Noise — Grant Oxford</title>
  <style>
    body{background:rgb(3,24,12);color:seashell;font-family:Arial,Helvetica,sans-serif;margin:0;padding:2rem}
    main{max-width:720px;margin:0 auto}
    h1{font-family:'Courier New', Courier, monospace;font-size:3rem}
    p{margin:1rem 0}
    .controls{display:flex;gap:1rem;align-items:center;margin-top:1rem}
    button{background:#123; color:seashell;border:1px solid seashell;padding:0.5rem 1rem;cursor:pointer}
    input[type=range]{width:180px}
    a{color:seashell;text-decoration:underline}
  </style>
</head>
<body>
  <main>
    <p><a href="index.html">← Back</a></p>
    <h1>Brown Noise</h1>
    <p>Play looped brown noise generated in your browser. Use the controls to start/stop and adjust volume.</p>

    <div class="controls">
      <button id="toggle">Start</button>
      <label>Volume <input id="volume" type="range" min="0" max="1" step="0.01" value="0.25"></label>
    </div>

    <p style="margin-top:1.5rem;font-size:0.95rem;color:lightgray">Note: audio will start only after you press Start (browser autoplay policy).</p>

    <script>
    (function(){
      let ctx = null;
      let src = null;
      let gain = null;

      function createBrownBuffer(audioCtx, seconds=2){
        const sampleRate = audioCtx.sampleRate;
        const length = sampleRate * seconds;
        const buffer = audioCtx.createBuffer(1, length, sampleRate);
        const data = buffer.getChannelData(0);
        let lastOut = 0.0;
        for(let i=0;i<length;i++){
          const white = Math.random()*2 - 1;
          lastOut = (lastOut + 0.02 * white) / 1.02;
          data[i] = lastOut * 3.5; // gain compensation
        }
        return buffer;
      }

      function start(){
        if(ctx) return;
        ctx = new (window.AudioContext || window.webkitAudioContext)();
        gain = ctx.createGain();
        gain.gain.value = Number(document.getElementById('volume').value);
        gain.connect(ctx.destination);

        const buffer = createBrownBuffer(ctx, 2);
        src = ctx.createBufferSource();
        src.buffer = buffer;
        src.loop = true;
        src.connect(gain);
        src.start();
      }

      function stop(){
        if(!ctx) return;
        try{ src.stop(); }catch(e){}
        src.disconnect();
        gain.disconnect();
        ctx.close();
        ctx = null; src = null; gain = null;
      }

      document.getElementById('toggle').addEventListener('click', function(){
        const btn = this;
        if(!ctx){ start(); btn.textContent = 'Stop'; }
        else { stop(); btn.textContent = 'Start'; }
      });

      document.getElementById('volume').addEventListener('input', function(){
        if(gain) gain.gain.value = Number(this.value);
      });
    })();
    </script>
  </main>
</body>
</html>
